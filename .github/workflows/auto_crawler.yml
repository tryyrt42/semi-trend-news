name: 🚀 Auto Semiconductor News Crawler

# 언제 실행할지 알람 시간을 설정합니다.
on:
  schedule:
    - cron: '0 */2 * * *'  # 2시간마다 정각에 실행 (예: 0시, 2시, 4시...)
  workflow_dispatch:       # 우리가 원할 때 수동으로 '실행 버튼'을 누를 수 있게 해주는 기능

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 코드가 변경된 index.html을 다시 저장소에 덮어쓸 수 있도록 허락해주는 권한

    steps:
    - name: 📂 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 부품(라이브러리) 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🤖 파이썬 크롤러 실행 (API 금고 열쇠 사용)
      env:
        # 아까 Settings 금고에 숨겨둔 키를 꺼내서 파이썬에게 쥐여줍니다.
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crawler.py

    - name: 💾 변경된 웹페이지 자동 저장 (Commit & Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add index.html
        # 만약 새로 추가된 기사가 없으면 에러를 내지 않고 조용히 넘어가도록 처리합니다.
        git commit -m "✨ 뉴스 자동 업데이트 완료" || echo "No changes to commit"
        git push
