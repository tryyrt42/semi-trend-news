name: 🚀 Auto Semiconductor News Crawler

on:
  schedule:
    - cron: '0 */1 * * *'  # 2시간마다 정각에 실행
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 📂 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 부품 직접 설치 (오류 해결 버전)
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser

    - name: 🤖 파이썬 크롤러 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python crawler.py

    - name: 💾 변경된 웹페이지 자동 저장
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add index.html
        git commit -m "✨ 뉴스 자동 업데이트 완료" || echo "No changes to commit"
        git push
