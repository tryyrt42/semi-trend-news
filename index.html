<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 반도체 에코시스템 모니터링</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; margin: 0; padding: 15px; }
        .container { max-width: 1300px; margin: 0 auto; display: none; }
        
        h1 { text-align: center; color: #0f172a; font-size: 1.8rem; margin-bottom: 5px; margin-top: 10px; }
        .updated-time { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        
        /* 🌟 리스트 접기/펼치기 버튼 */
        .toggle-btn-container { text-align: center; margin-bottom: 25px; }
        .toggle-btn { 
            background: #1e293b; color: white; border: none; padding: 10px 24px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 0.95rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s;
        }
        .toggle-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 10px rgba(0,0,0,0.15); }

        .major-category { margin-bottom: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .major-category h2 { margin-top: 0; border-bottom: 3px solid; padding-bottom: 10px; margin-bottom: 15px; font-size: 1.3rem; color: #1e293b; display: flex; flex-direction: column; }
        .major-category h2 span { font-size: 0.85rem; color: #64748b; font-weight: normal; margin-top: 4px; }
        
        .cat-DSP h2 { border-bottom-color: #10b981; }
        .cat-Fabless h2 { border-bottom-color: #3b82f6; }
        .cat-Foundry h2 { border-bottom-color: #f59e0b; }

        .country-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .country-card { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .country-card h3 { margin-top: 0; color: #334155; font-size: 0.95rem; margin-bottom: 12px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 6px;}
        
        .company-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .company-btn { 
            background: white; color: #475569; border: 1px solid #cbd5e1; 
            padding: 5px 12px; border-radius: 15px; cursor: pointer; 
            font-weight: 600; text-decoration: none; transition: all 0.2s; font-size: 0.8rem; 
        }
        
        .btn-DSP:hover { background: #10b981; color: white; border-color: #10b981; }
        .btn-Fabless:hover { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-Foundry:hover { background: #f59e0b; color: white; border-color: #f59e0b; }

        .news-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-top: 20px; }
        .filter-controls { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px; }
        .filter-controls h2 { margin: 0; color: #1e293b; font-size: 1.3rem; border: none; padding: 0; }
        
        /* 🌟 전체 기사 보기 버튼 */
        .show-all-btn { 
            background: #3b82f6; color: white; border: none; padding: 8px 16px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }
        .show-all-btn:hover { background: #2563eb; }

        .news-card { padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #3b82f6; background: #f8fafc; font-size: 0.9rem; }

        @media (max-width: 768px) {
            h1 { font-size: 1.4rem; }
            .filter-controls { flex-direction: column; gap: 10px; align-items: flex-start; }
            .show-all-btn { width: 100%; }
            .major-category { padding: 15px; }
            .country-grid { grid-template-columns: 1fr; gap: 10px; }
            .country-card h3 { 
                cursor: pointer; margin-bottom: 0; border-bottom: none; 
                padding-bottom: 0; display: flex; justify-content: space-between; align-items: center;
            }
            .country-card h3::after { content: '▼'; font-size: 0.75rem; color: #94a3b8; transition: transform 0.2s; }
            .company-list { display: none; margin-top: 12px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
            .country-card.open h3::after { transform: rotate(180deg); color: #3b82f6; }
            .country-card.open .company-list { display: flex; }
        }

        /* 🔒 비밀번호 창 */
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; justify-content:center; align-items:center; z-index:999; }
        .auth-box { background:white; padding:30px; border-radius:12px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.5); width: 85%; max-width: 320px; }
        .auth-box input { padding:10px; width:80%; margin-bottom:20px; border:2px solid #cbd5e1; border-radius:6px; font-size:1rem; text-align:center; }
        .auth-box button { padding:10px 20px; background:#3b82f6; color:white; border:none; border-radius:6px; cursor:pointer; font-size:1rem; font-weight:bold; width: 87%; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="margin-top:0; color:#1e293b; font-size: 1.4rem;">팀 대시보드 접근</h2>
            <p style="color:#64748b; font-size: 0.9rem;">공유받은 비밀번호를 입력하세요.</p>
            <input type="password" id="team-password" placeholder="Password" onkeydown="if(event.key==='Enter') verifyPassword()"><br>
            <button onclick="verifyPassword()">접속하기</button>
        </div>
    </div>

    <div class="container" id="main-content">
        <h1>글로벌 반도체 모니터링 시스템</h1>
        <div class="updated-time">최근 업데이트: 2026-05-21 02:40 (1시간 간격 순차적 기사 누적 중)</div>

        <div class="toggle-btn-container">
            <button id="toggleListBtn" class="toggle-btn" onclick="toggleEcosystem()">▲ 기업 리스트 전체 접기</button>
        </div>

        <div id="ecosystem-wrapper">
            <div id="ecosystem-container"></div>
        </div>

        <div class="news-section">
            <div class="filter-controls">
                <h2>기업별 실시간 모니터링 기사</h2>
                <button onclick="filterNews('all')" class="show-all-btn">🌐 전체 기사 다시 보기</button>
            </div>
            
            <p id="filter-status-msg" style="color: #10b981; font-weight: bold; display: none; margin-top:-5px; margin-bottom:15px; font-size: 0.95rem;"></p>
            <p style="color: #64748b; margin-top:-5px; margin-bottom:20px; font-size:0.85rem;">※ 위 회사 버튼을 클릭하면 리스트가 자동으로 접히며 해당 기업의 기사만 나타납니다.</p>
            
            </div>
    </div>

    <script>
        const CONFIG_PASSWORD = "1"; 

        const ecosystemData = [
            {
                category: "DSP",
                title: "📐 DSP / Design House",
                desc: "(자사 및 디자인 솔루션 파트너/경쟁사)",
                regions: [
                    { name: "한국 (Korea)", companies: ["알파칩스", "에이디테크놀로지", "가온칩스", "세미파이브", "코아시아", "에이직랜드", "하나텍", "에이씨피씨", "칩스앤미디어"] },
                    { name: "대만 (Taiwan)", companies: ["글로벌유니칩 (GUC)", "알칩 (Alchip)", "패러데이", "M31 Technology", "CreoChip", "Open-Silicon"] },
                    { name: "중국 (China)", companies: ["베리실리콘 (VeriSilicon)", "Innosilicon"] },
                    { name: "영국 및 미국 (UK/USA)", companies: ["손드렐 (Sondrel)", "EnSilica", "eInfochips"] }
                ]
            },
            {
                category: "Fabless",
                title: "💻 Fabless / Big Tech",
                desc: "(고객사 및 과제 발굴 타겟)",
                regions: [
                    { name: "한국 — AI·차세대", companies: ["퓨리오사AI", "리벨리온", "딥엑스", "파두", "망고부스트", "사피온", "모빌린트", "오픈엣지테크", "씨유박스", "에이직원"] },
                    { name: "한국 — 통신·RF", companies: ["GCT Semiconductor", "에이스테크놀로지", "알에프에이치아이씨", "와이솔", "이노칩테크놀로지"] },
                    { name: "한국 — 이미지·센서", companies: ["픽셀플러스", "실리콘옵틱스", "에스엘파워일렉트로닉스", "아이즈비전"] },
                    { name: "한국 — 오디오·전력·아날로그", companies: ["보스반도체", "동운아나텍", "실리콘마이터스", "에이디반도체", "MagnaChip반도체"] },
                    { name: "한국 — 디스플레이·스토리지", companies: ["LX세미콘", "실리콘웍스", "아나패스", "라온텍", "칩원텍", "제주반도체"] },
                    { name: "한국 — 차량용·MCU·기타", companies: ["텔레칩스", "넥스트칩", "에이비오브", "코아로직", "엠씨넥스", "세코닉스", "넥슨반도체"] },
                    { name: "미국 — 전통 팹리스", companies: ["NVIDIA", "AMD", "Qualcomm", "Broadcom", "Marvell", "Lattice", "Cirrus Logic", "Microchip", "MPS", "Skyworks", "Qorvo", "Wolfspeed", "Silicon Labs", "MaxLinear"] },
                    { name: "미국 — 빅테크 자체 칩", companies: ["Apple", "Google", "Amazon", "Microsoft", "Meta", "Tesla", "OpenAI", "Intel"] },
                    { name: "대만 (Taiwan)", companies: ["MediaTek", "Novatek", "Realtek", "Himax", "Parade Tech", "ITE Tech", "Elan Microelectronics", "Airoha", "Silicon Motion"] },
                    { name: "유럽 (Europe)", companies: ["NXP", "STMicroelectronics", "Infineon", "Nordic", "u-blox", "Melexis"] }
                ]
            },
            {
                category: "Foundry",
                title: "🏭 Foundry",
                desc: "(생산 파트너 및 글로벌 핵심 제조사)",
                regions: [
                    { name: "한국 (Korea)", companies: ["Samsung Foundry"] },
                    { name: "대만 (Taiwan)", companies: ["TSMC"] }
                ]
            }
        ];

        function verifyPassword() {
            const userInput = document.getElementById("team-password").value;
            if (userInput === CONFIG_PASSWORD) {
                document.getElementById("auth-overlay").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                renderEcosystem(); 
            } else {
                alert("비밀번호가 올바르지 않습니다.");
                document.getElementById("team-password").value = "";
            }
        }

        function renderEcosystem() {
            const container = document.getElementById('ecosystem-container');
            let htmlContent = '';

            ecosystemData.forEach(cat => {
                htmlContent += `
                    <div class="major-category cat-${cat.category}">
                        <h2>${cat.title} <span>${cat.desc}</span></h2>
                        <div class="country-grid">
                `;

                cat.regions.forEach(region => {
                    htmlContent += `
                        <div class="country-card">
                            <h3 onclick="toggleMobileRegion(this.parentNode)">${region.name}</h3>
                            <div class="company-list">
                    `;

                    region.companies.forEach(company => {
                        const safeId = company.split(' ')[0].toLowerCase().replace(/[^a-z0-9가-힣]/g, '');
                        // 🌟 여기서 버튼을 누르면 filterNews 함수가 발동합니다!
                        htmlContent += `<button onclick="filterNews('${safeId}', '${company}')" class="company-btn btn-${cat.category}">${company}</button>`;
                    });

                    htmlContent += `
                            </div>
                        </div>
                    `;
                });
                htmlContent += `</div></div>`;
            });

            container.innerHTML = htmlContent;
        }

        function toggleEcosystem() {
            const wrapper = document.getElementById('ecosystem-wrapper');
            const btn = document.getElementById('toggleListBtn');
            if (wrapper.style.display === 'none') {
                wrapper.style.display = 'block';
                btn.innerText = '▲ 기업 리스트 전체 접기';
                btn.style.background = '#1e293b';
            } else {
                wrapper.style.display = 'none';
                btn.innerText = '▼ 기업 리스트 다시 펼치기';
                btn.style.background = '#3b82f6';
            }
        }

        // 🌟 클릭 시 접히고 + 필터링되고 + 전체보기 시 돌아오는 마법의 로직
        function filterNews(companyId, companyName) {
            const allCards = document.querySelectorAll('.news-card');
            const statusMsg = document.getElementById('filter-status-msg');
            const wrapper = document.getElementById('ecosystem-wrapper');
            const toggleBtn = document.getElementById('toggleListBtn');
            let visibleCount = 0;

            if (companyId === 'all') {
                allCards.forEach(card => card.style.display = 'block');
                statusMsg.style.display = 'none';
                
                // 다시 목록 펼치기
                wrapper.style.display = 'block';
                toggleBtn.innerText = '▲ 기업 리스트 전체 접기';
                toggleBtn.style.background = '#1e293b';
            } else {
                allCards.forEach(card => {
                    const cardText = card.innerText.toLowerCase();
                    const shortName = companyName.split(' ')[0].toLowerCase();
                    if (card.id === 'co-' + companyId || cardText.includes(shortName)) {
                        card.style.display = 'block';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                statusMsg.style.display = 'block';
                if (visibleCount > 0) {
                    statusMsg.innerText = `✅ [ ${companyName} ] 관련 기사가 필터링 되었습니다.`;
                    statusMsg.style.color = '#10b981';
                } else {
                    statusMsg.innerText = `⚠️ [ ${companyName} ] 관련 최신 기사가 아직 수집되지 않았습니다.`;
                    statusMsg.style.color = '#ef4444';
                }

                // 🌟 여기서 자동으로 상단 기업 리스트를 닫아줍니다!
                wrapper.style.display = 'none';
                toggleBtn.innerText = '▼ 기업 리스트 다시 펼치기';
                toggleBtn.style.background = '#3b82f6';
            }

            document.querySelector('.news-section').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleMobileRegion(cardElement) {
            if (window.innerWidth <= 768) {
                cardElement.classList.toggle('open');
            }
        }
    </script>
</body>
</html>
