<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 반도체 트렌드 대시보드 (Pro)</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; padding: 20px; }
        
        /* 🔒 잠금 화면 */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); text-align: center; }
        .login-box input { padding: 12px; margin-top: 15px; border: 1px solid #cbd5e1; border-radius: 6px; width: 200px; font-size: 1rem; text-align: center; }
        .login-box button { padding: 12px 24px; margin-top: 15px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .login-box button:hover { background: #2563eb; }

        /* 대시보드 헤더 */
        #dashboard-screen { display: none; max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .updated-time { font-size: 0.9rem; color: #64748b; margin-bottom: 20px; text-align: center; }
        
        /* 🗂️ 아코디언(접기/펼치기) 생태계 분류 UI */
        .category-section { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; overflow: hidden; }
        .category-summary { background: #1e293b; color: white; padding: 15px 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .category-summary::-webkit-details-marker { display: none; }
        .category-summary::after { content: '▼'; font-size: 0.8rem; transition: transform 0.3s; }
        details[open] .category-summary::after { transform: rotate(180deg); }
        
        .subcategory-group { padding: 15px 20px; border-top: 1px solid #e2e8f0; }
        .subcategory-title { font-size: 0.95rem; color: #475569; margin: 0 0 10px 0; border-left: 3px solid #3b82f6; padding-left: 8px; }
        
        /* 기업 버튼 그리드 */
        .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .filter-btn { padding: 8px 14px; border: 1px solid #cbd5e1; background: white; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: #475569; }
        .filter-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
        .filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; font-weight: bold; box-shadow: 0 2px 4px rgb(59 130 246 / 0.4); }

        /* 전체보기 특별 버튼 */
        .all-btn-container { text-align: center; margin-bottom: 20px; }
        .all-btn { background: #3b82f6; color: white; padding: 12px 30px; border-radius: 30px; font-size: 1rem; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 6px rgb(59 130 246 / 0.3); transition: 0.2s; }
        .all-btn:hover { background: #2563eb; }
        
        /* 뉴스 타임라인 영역 */
        #global-news-feed { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); min-height: 200px; scroll-margin-top: 20px; }
        .article-item { border-left: 4px solid #3b82f6; padding-left: 15px; margin-bottom: 25px; }
        .company-badge { display: inline-block; background: #1e293b; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; }
        .news-date { font-size: 0.8rem; color: #64748b; margin: 0 0 8px 0; }
        .news-title { margin: 0 0 8px 0; font-size: 1.1rem; color: #0f172a; line-height: 1.4; }
        .news-summary { margin: 0 0 10px 0; font-size: 0.95rem; line-height: 1.6; color: #334155; }
        .news-link { color: #3b82f6; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        
        .no-news-msg { text-align: center; color: #64748b; font-size: 1rem; padding: 40px 0; display: none; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .category-summary { padding: 12px 15px; font-size: 1rem; }
            .filter-btn { font-size: 0.75rem; padding: 6px 10px; }
            #global-news-feed { padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-top: 0; color: #1e293b;">🔒 관리자 인증</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">비밀번호를 입력해야 접속할 수 있습니다.</p>
            <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeypress="if(event.keyCode==13) checkPassword()">
            <br>
            <button onclick="checkPassword()">대시보드 입장</button>
        </div>
    </div>

    <div id="dashboard-screen">
        <div class="header">
            <h1 style="margin-bottom: 5px;">🌐 글로벌 반도체 생태계 동향</h1>
            <div class="updated-time">최근 업데이트: 파이썬 로봇 수집 대기 중...</div>
        </div>

        <div class="all-btn-container">
            <button class="all-btn active" onclick="filterNews('all', this)">전체 타임라인 펼쳐보기</button>
        </div>

        <details class="category-section" id="cat-dsp" open>
            <summary class="category-summary">🏢 DSP / Design House (디자인하우스)</summary>
            <div class="subcategory-group">
                <h4 class="subcategory-title">🇰🇷 대한민국</h4>
                <div class="btn-grid">
                    <button class="filter-btn" onclick="filterNews('알파칩스', this)">알파칩스</button>
                    <button class="filter-btn" onclick="filterNews('에이디테크놀로지', this)">에이디테크놀로지</button>
                    <button class="filter-btn" onclick="filterNews('가온칩스', this)">가온칩스</button>
                    <button class="filter-btn" onclick="filterNews('세미파이브', this)">세미파이브</button>
                    <button class="filter-btn" onclick="filterNews('코아시아', this)">코아시아</button>
                    <button class="filter-btn" onclick="filterNews('에이직랜드', this)">에이직랜드</button>
                    <button class="filter-btn" onclick="filterNews('하나텍', this)">하나텍</button>
                    <button class="filter-btn" onclick="filterNews('에이씨피씨', this)">에이씨피씨</button>
                </div>
                <h4 class="subcategory-title">🌐 글로벌 (대만/미국/유럽 등)</h4>
                <div class="btn-grid">
                    <button class="filter-btn" onclick="filterNews('글로벌유니칩 (GUC)', this)">글로벌유니칩 (GUC)</button>
                    <button class="filter-btn" onclick="filterNews('알칩 (Alchip)', this)">알칩 (Alchip)</button>
                    <button class="filter-btn" onclick="filterNews('패러데이', this)">패러데이</button>
                    <button class="filter-btn" onclick="filterNews('M31 Technology', this)">M31 Technology</button>
                    <button class="filter-btn" onclick="filterNews('CreoChip', this)">CreoChip</button>
                    <button class="filter-btn" onclick="filterNews('Open-Silicon', this)">Open-Silicon</button>
                    <button class="filter-btn" onclick="filterNews('베리실리콘 (VeriSilicon)', this)">베리실리콘 (VeriSilicon)</button>
                    <button class="filter-btn" onclick="filterNews('Innosilicon', this)">Innosilicon</button>
                    <button class="filter-btn" onclick="filterNews('손드렐 (Sondrel)', this)">손드렐 (Sondrel)</button>
                    <button class="filter-btn" onclick="filterNews('EnSilica', this)">EnSilica</button>
                    <button class="filter-btn" onclick="filterNews('eInfochips', this)">eInfochips</button>
                </div>
            </div>
        </details>

        <details class="category-section" id="cat-fabless" open>
            <summary class="category-summary">💡 Fabless (팹리스)</summary>
            <div class="subcategory-group">
                <h4 class="subcategory-title">🇰🇷 대한민국 (AI / NPU)</h4>
                <div class="btn-grid">
                    <button class="filter-btn" onclick="filterNews('퓨리오사AI', this)">퓨리오사AI</button>
                    <button class="filter-btn" onclick="filterNews('리벨리온', this)">리벨리온</button>
                    <button class="filter-btn" onclick="filterNews('딥엑스', this)">딥엑스</button>
                    <button class="filter-btn" onclick="filterNews('파두', this)">파두</button>
                    <button class="filter-btn" onclick="filterNews('망고부스트', this)">망고부스트</button>
                    <button class="filter-btn" onclick="filterNews('사피온', this)">사피온</button>
                    <button class="filter-btn" onclick="filterNews('모빌린트', this)">모빌린트</button>
                    <button class="filter-btn" onclick="filterNews('오픈엣지테크', this)">오픈엣지테크</button>
                </div>
                <h4 class="subcategory-title">🇰🇷 대한민국 (기타 팹리스)</h4>
                <div class="btn-grid">
                    <button class="filter-btn" onclick="filterNews('씨유박스', this)">씨유박스</button>
                    <button class="filter-btn" onclick="filterNews('에이직원', this)">에이직원</button>
                    <button class="filter-btn" onclick="filterNews('LX세미콘', this)">LX세미콘</button>
                    <button class="filter-btn" onclick="filterNews('제주반도체', this)">제주반도체</button>
                    <button class="filter-btn" onclick="filterNews('텔레칩스', this)">텔레칩스</button>
                    <button class="filter-btn" onclick="filterNews('넥스트칩', this)">넥스트칩</button>
                    <button class="filter-btn" onclick="filterNews('어보브반도체', this)">어보브반도체</button>
                    <button class="filter-btn" onclick="filterNews('동운아나텍', this)">동운아나텍</button>
                    </div>
                <h4 class="subcategory-title">🇺🇸 미국 (빅테크 & 글로벌 팹리스)</h4>
                <div class="btn-grid">
                    <button class="filter-btn" onclick="filterNews('NVIDIA', this)">NVIDIA</button>
                    <button class="filter-btn" onclick="filterNews('AMD', this)">AMD</button>
                    <button class="filter-btn" onclick="filterNews('Qualcomm', this)">Qualcomm</button>
                    <button class="filter-btn" onclick="filterNews('Broadcom', this)">Broadcom</button>
                    <button class="filter-btn" onclick="filterNews('Marvell', this)">Marvell</button>
                    <button class="filter-btn" onclick="filterNews('Intel', this)">Intel</button>
                    <button class="filter-btn" onclick="filterNews('Apple', this)">Apple</button>
                    <button class="filter-btn" onclick="filterNews('Google', this)">Google</button>
                    <button class="filter-btn" onclick="filterNews('Amazon', this)">Amazon</button>
                    <button class="filter-btn" onclick="filterNews('Microsoft', this)">Microsoft</button>
                    <button class="filter-btn" onclick="filterNews('Meta', this)">Meta</button>
                    <button class="filter-btn" onclick="filterNews('Tesla', this)">Tesla</button>
                    <button class="filter-btn" onclick="filterNews('OpenAI', this)">OpenAI</button>
                </div>
                <h4 class="subcategory-title">🇹🇼 대만 / 🇪🇺 유럽</h4>
                <div class="btn-grid">
                    <button class="filter-btn" onclick="filterNews('MediaTek', this)">MediaTek (대만)</button>
                    <button class="filter-btn" onclick="filterNews('Realtek', this)">Realtek (대만)</button>
                    <button class="filter-btn" onclick="filterNews('NXP', this)">NXP (유럽)</button>
                    <button class="filter-btn" onclick="filterNews('STMicroelectronics', this)">ST (유럽)</button>
                    <button class="filter-btn" onclick="filterNews('Infineon', this)">Infineon (유럽)</button>
                </div>
            </div>
        </details>

        <details class="category-section" id="cat-foundry" open>
            <summary class="category-summary">🏭 Foundry (파운드리)</summary>
            <div class="subcategory-group">
                <div class="btn-grid">
                    <button class="filter-btn" onclick="filterNews('Samsung Foundry', this)">Samsung Foundry 🇰🇷</button>
                    <button class="filter-btn" onclick="filterNews('TSMC', this)">TSMC 🇹🇼</button>
                </div>
            </div>
        </details>

        <div id="global-news-feed">
            <div id="no-news" class="no-news-msg">해당 기업의 30일 이내 최신 기사가 아직 수집되지 않았습니다.</div>
        </div>
    </div>

    <script>
        // 🔒 비밀번호 확인 (1234 변경 가능)
        function checkPassword() {
            const inputPw = document.getElementById("pw-input").value;
            if (inputPw === "1111") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("dashboard-screen").style.display = "block";
                
                // 로그인 직후 기사들 타임스탬프 기반 최신순 정렬
                const feed = document.getElementById("global-news-feed");
                const articles = Array.from(feed.querySelectorAll(".article-item"));
                articles.sort((a, b) => parseInt(b.getAttribute("data-timestamp")) - parseInt(a.getAttribute("data-timestamp")));
                articles.forEach(article => feed.appendChild(article));
            } else {
                alert("비밀번호가 일치하지 않습니다.");
            }
        }

        // 💡 용규님이 원하셨던 완벽한 UX 흐름 제어 스크립트!
        function filterNews(companyName, btnElement) {
            // 1. 모든 버튼 색상 초기화 후 누른 버튼만 색상 활성화
            document.querySelectorAll('.filter-btn, .all-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            // 2. 기사 필터링
            const articles = document.querySelectorAll('.article-item');
            let visibleCount = 0;
            articles.forEach(article => {
                if (companyName === 'all' || article.getAttribute('data-id') === companyName) {
                    article.style.display = 'block';
                    visibleCount++;
                } else {
                    article.style.display = 'none';
                }
            });

            // 3. 기사 유무 메시지
            document.getElementById('no-news').style.display = (visibleCount === 0 && companyName !== 'all') ? 'block' : 'none';

            // 4. ✨ 핵심 UX: 전체보기 vs 개별 업체 클릭 시의 아코디언/스크롤 제어
            const detailsList = document.querySelectorAll('details.category-section');
            const feedSection = document.getElementById('global-news-feed');

            if (companyName === 'all') {
                // '전체 타임라인' 누르면 -> 모든 목록이 쫙 펼쳐지면서 기사 쪽으로 내려감
                detailsList.forEach(detail => detail.open = true);
            } else {
                // 특정 '업체'를 누르면 -> 목록이 싹 다 접히면서 기사 쪽으로 스무스하게 내려감
                detailsList.forEach(detail => detail.open = false);
            }
            
            // 공통: 기사 피드 구역으로 스무스하게 스크롤!
            feedSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
