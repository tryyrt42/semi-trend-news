<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 반도체 트렌드 대시보드 (Pro)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .updated-time { font-size: 0.9rem; color: #64748b; margin-bottom: 20px; text-align: center; }
        
        /* 기업 필터 버튼 영역 */
        .filter-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 30px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .filter-btn { padding: 8px 14px; border: 1px solid #cbd5e1; background: white; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: #475569; }
        .filter-btn:hover { background: #f1f5f9; }
        .filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; font-weight: bold; }
        
        /* 뉴스 타임라인 영역 */
        #global-news-feed { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .article-item { border-left: 4px solid #3b82f6; padding-left: 15px; margin-bottom: 25px; transition: opacity 0.3s ease; }
        .company-badge { display: inline-block; background: #1e293b; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; }
        .news-date { font-size: 0.8rem; color: #64748b; margin: 0 0 8px 0; }
        .news-title { margin: 0 0 8px 0; font-size: 1.1rem; color: #0f172a; }
        .news-summary { margin: 0 0 10px 0; font-size: 0.95rem; line-height: 1.5; color: #334155; }
        .news-link { color: #3b82f6; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌐 글로벌 반도체 최신 동향</h1>
        <div class="updated-time">최근 업데이트: 데이터 수집 대기 중...</div>
    </div>

    <div class="filter-container" id="filter-buttons">
        <button class="filter-btn active" onclick="filterNews('all')">전체 타임라인 보기</button>
    </div>

    <div id="global-news-feed">
        </div>

    <script>
        // 화면 로딩 시 기사들을 시간순(최신순)으로 완벽하게 자동 정렬하는 마법의 스크립트
        document.addEventListener("DOMContentLoaded", () => {
            const feed = document.getElementById("global-news-feed");
            const articles = Array.from(feed.querySelectorAll(".article-item"));
            
            // data-timestamp 값을 기준으로 내림차순(최신 기사가 위로) 정렬
            articles.sort((a, b) => {
                return parseInt(b.getAttribute("data-timestamp")) - parseInt(a.getAttribute("data-timestamp"));
            });
            
            // 정렬된 순서대로 다시 화면에 붙여넣기
            articles.forEach(article => feed.appendChild(article));
            generateFilterButtons();
        });

        // 사용자가 회사 버튼을 눌렀을 때 해당 회사 기사만 보여주는 필터 함수
        function filterNews(companyId) {
            // 버튼 색상 변경
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 기사 숨기기/보이기
            const articles = document.querySelectorAll('.article-item');
            articles.forEach(article => {
                if (companyId === 'all' || article.getAttribute('data-id') === companyId) {
                    article.style.display = 'block';
                } else {
                    article.style.display = 'none';
                }
            });
        }

        // 존재하는 기사들을 분석해서 상단 필터 버튼을 자동으로 만들어주는 함수
        function generateFilterButtons() {
            const articles = document.querySelectorAll('.article-item');
            const companies = new Set();
            articles.forEach(a => companies.add(a.getAttribute('data-id')));
            
            const btnContainer = document.getElementById('filter-buttons');
            companies.forEach(comp => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = comp;
                btn.onclick = (e) => filterNews(comp);
                btnContainer.appendChild(btn);
            });
        }
    </script>
</body>
</html>
